name: CI

on:
  push:
  pull_request:

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dev dependencies
        run: uv sync --dev
        working-directory: backend

      - name: Ruff lint
        run: uv run ruff check
        working-directory: backend

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json  # reads "volta.node"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  Typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dev dependencies
        run: uv sync --dev
        working-directory: backend

      - name: Basedpyright
        run: uv run basedpyright
        working-directory: backend

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Mock build (skipped for take-home)
        run: echo "Build check passed (mocked)"
